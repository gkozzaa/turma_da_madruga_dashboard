<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEDALA.AI — Turma da Madruga</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --card: #16161f;
    --border: #1e1e2e;
    --accent: #e8ff3c;
    --accent2: #ff4d6d;
    --accent3: #4dffb4;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --rank1: #ffd700;
    --rank2: #c0c0c0;
    --rank3: #cd7f32;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* HERO SELECTOR */
  .hero {
    padding: 60px 40px 40px;
    text-align: center;
    position: relative;
  }

  .hero::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(232,255,60,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    letter-spacing: 4px;
    line-height: 0.9;
    color: var(--text);
    margin-bottom: 8px;
  }

  .hero-title span { color: var(--accent); }

  .hero-sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 48px;
  }

  /* MEMBER GRID SELECTOR */
  .selector-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 800px;
    margin: 0 auto 48px;
  }

  .member-pill {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 20px;
    border-radius: 100px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .member-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .member-pill.active {
    background: var(--accent);
    color: #0a0a0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  /* MAIN CONTENT */
  .main {
    padding: 0 40px 80px;
    max-width: 1200px;
    margin: 0 auto;
    display: none;
  }

  .main.visible { display: block; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* PROFILE HEADER */
  .profile-header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 40px;
    padding: 32px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }

  .profile-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(232,255,60,0.08) 0%, transparent 70%);
  }

  .profile-avatar {
    width: 72px;
    height: 72px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: #0a0a0f;
    flex-shrink: 0;
  }

  .profile-info h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .profile-info .fullname {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .profile-info .since {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .since-dot {
    width: 6px; height: 6px;
    background: var(--accent3);
    border-radius: 50%;
  }

  .rank-badge {
    margin-left: auto;
    text-align: right;
    flex-shrink: 0;
  }

  .rank-badge .rank-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: var(--accent);
  }

  .rank-badge .rank-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* KPI GRID */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card:hover { border-color: var(--accent); }

  .kpi-card .kpi-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .kpi-card .kpi-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
    line-height: 1;
    color: var(--text);
  }

  .kpi-card .kpi-unit {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  .kpi-card .kpi-accent {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    width: 100%;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .kpi-card:hover .kpi-accent { transform: scaleX(1); }

  /* TWO COL */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  /* SECTION CARD */
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* STAT ROW */
  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-row-label {
    font-size: 13px;
    color: var(--muted);
  }

  .stat-row-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* BAR CHART */
  .bar-chart { }

  .bar-item {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .bar-item:last-child { margin-bottom: 0; }

  .bar-label {
    font-size: 12px;
    color: var(--muted);
    width: 100px;
    flex-shrink: 0;
    text-align: right;
  }

  .bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--accent);
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  .bar-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    width: 60px;
    flex-shrink: 0;
  }

  /* RANKING TABLE */
  .ranking-table {
    width: 100%;
  }

  .ranking-row {
    display: grid;
    grid-template-columns: 40px 1fr 80px 100px;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    border-radius: 6px;
  }

  .ranking-row:hover { background: rgba(232,255,60,0.03); }
  .ranking-row:last-child { border-bottom: none; }

  .ranking-row.highlight {
    background: rgba(232,255,60,0.07);
    border-color: rgba(232,255,60,0.2);
  }

  .rank-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    text-align: center;
    color: var(--muted);
  }

  .rank-pos.gold { color: var(--rank1); }
  .rank-pos.silver { color: var(--rank2); }
  .rank-pos.bronze { color: var(--rank3); }
  .rank-pos.you { color: var(--accent); }

  .rank-name {
    font-size: 14px;
    font-weight: 500;
  }

  .rank-pts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-align: right;
  }

  .rank-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
  }

  .rank-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--accent);
  }

  /* POWER GAUGE */
  .gauges {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .gauge-item {
    text-align: center;
  }

  .gauge-circle {
    width: 80px;
    height: 80px;
    margin: 0 auto 8px;
    position: relative;
  }

  .gauge-circle svg {
    transform: rotate(-90deg);
  }

  .gauge-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .gauge-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1);
  }

  .gauge-label-val {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--text);
  }

  .gauge-name {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* FULL WIDTH */
  .full-width {
    grid-column: 1 / -1;
  }

  /* ACHIEVEMENT CHIPS */
  .achievements {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .chip {
    background: rgba(232,255,60,0.1);
    border: 1px solid rgba(232,255,60,0.2);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .chip.red {
    background: rgba(255,77,109,0.1);
    border-color: rgba(255,77,109,0.2);
    color: var(--accent2);
  }

  .chip.green {
    background: rgba(77,255,180,0.1);
    border-color: rgba(77,255,180,0.2);
    color: var(--accent3);
  }

  /* COMPARE MODE */
  .compare-header {
    text-align: center;
    padding: 20px 0 40px;
  }

  .compare-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
    margin-top: 16px;
  }

  .compare-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header { padding: 16px 20px; }
    .hero { padding: 40px 20px 30px; }
    .main { padding: 0 20px 60px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
    .gauges { grid-template-columns: repeat(3, 1fr); }
    .ranking-row { grid-template-columns: 30px 1fr 70px; }
    .rank-bar-track { display: none; }
    .profile-header { flex-wrap: wrap; }
  }
</style>
</head>

<header>
  <div class="logo">
    <div class="logo-icon">🚴</div>
    <div>
      <div class="logo-text">PEDALA.AI</div>
      <div class="logo-sub">Turma da Madruga · Rise Hub</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;">06h10 🌙</div>
</header>

<div class="hero">
  <div class="hero-label">Seu dashboard de performance</div>
  <div class="hero-title">TURMA DA<br><span>MADRUGA</span></div>
  <div class="hero-sub">Selecione seu nome para ver seus dados</div>

  <div class="selector-grid" id="selectorGrid"></div>
</div>

<div class="main" id="mainContent">

  <div class="profile-header" id="profileHeader"></div>

  <div class="two-col">

    </div>
    <div class="section-card">
      <div class="section-title">Performance por Métrica</div>
      <div class="bar-chart" id="barChart"></div>
    </div>
  </div>

  <!-- Two Col -->
  <div class="two-col">
    <div class="section-card">
      <div class="section-title">Dados de Potência & Velocidade</div>
      <div id="powerStats"></div>
    </div>
    <div class="section-card">
      <div class="section-title">Dados de Pedalada</div>
      <div id="rpmStats"></div>
    </div>
  </div>

  <!-- Achievements -->
  <div class="section-card" style="margin-top:12px;">
    <div class="section-title">Destaques</div>
    <div class="achievements" id="achievements"></div>
  </div>

  <!-- Download -->
  <div style="margin-top:12px;display:flex;justify-content:flex-end;">
    <button id="downloadBtn" onclick="downloadCSV()" style="background:var(--accent);color:#0a0a0f;border:none;padding:10px 24px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;">
      ⬇️ Baixar meus dados (CSV)
    </button>
  </div>

  <!-- Evolução Mensal -->
  <div class="section-card" style="margin-top:12px;">
    <div class="section-title">Evolução Mensal — Abr/25 a Abr/26</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;" id="metricPills"></div>
    <div style="position:relative;height:280px;">
      <canvas id="evolutionChart"></canvas>
    </div>
  </div>
</div>

function selectMember(m, pill, isProf) {
  document.querySelectorAll('.member-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  currentMember = m;
  if (isProf) {
    renderProfessor(m);
  } else {
    renderDashboard(m);
  }
  document.getElementById('mainContent').classList.add('visible');
  setTimeout(() => document.getElementById('mainContent').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

function fmt(n) {
  return n.toLocaleString('pt-BR');
}

function getRank(m) {
  return DATA.findIndex(d => d.id === m.id) + 1;
}

function rankClass(pos) {
  if (pos === 1) return 'gold';
  if (pos === 2) return 'silver';
  if (pos === 3) return 'bronze';
  return '';
}

function getPercentileRank(m, field) {
  const vals = DATA.map(d => d[field]).sort((a, b) => a - b);
  const myVal = m[field];
  const below = vals.filter(v => v < myVal).length;
  return Math.round((below / vals.length) * 100);
}

  const rank = getRank(m);

  let rankingHTML = '';

    <div class="stat-row">
      <div class="stat-row-label">FTP</div>
      <div class="stat-row-value">${m.ftp} W</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">W/kg Médio</div>
      <div class="stat-row-value">${m.avg_power_wkg} w/kg</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">W/kg Máximo</div>
      <div class="stat-row-value">${m.max_power_wkg} w/kg</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">Vel. Média</div>
      <div class="stat-row-value">${m.avg_speed} km/h</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">Vel. Máxima</div>
      <div class="stat-row-value">${m.max_speed} km/h</div>
    </div>
  `;

  // RPM Stats
  const ptsPorAulaVal = m.aulas > 0 ? Math.round(m.pontos / m.aulas) : 0;
  const calPorAula = m.aulas > 0 ? Math.round(m.calorias / m.aulas) : 0;
  document.getElementById('rpmStats').innerHTML = `
    <div class="stat-row">
      <div class="stat-row-label">RPM Médio</div>
      <div class="stat-row-value">${m.avg_rpm} rpm</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">RPM Máximo</div>
      <div class="stat-row-value">${m.max_rpm} rpm</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">FC Máxima</div>
      <div class="stat-row-value">${m.hr_max_bpm} bpm</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">Pts por Aula</div>
      <div class="stat-row-value">${fmt(ptsPorAulaVal)}</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">Cal por Aula</div>
      <div class="stat-row-value">${calPorAula} kcal</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">Km por Aula</div>
      <div class="stat-row-value">${(m.distancia_km / m.aulas).toFixed(1)} km</div>
    </div>
    <div class="stat-row">
      <div class="stat-row-label">Peso</div>
      <div class="stat-row-value">${m.peso_kg} kg</div>
    </div>
  `;

  // Achievements
  const chips = [];
  if (rank === 1) chips.push({ label: '🏆 Líder do Grupo', type: '' });
  if (rank <= 3) chips.push({ label: `🥇 Top ${rank} do Grupo`, type: '' });
  if (m.aulas >= 500) chips.push({ label: '🔥 +500 Aulas', type: '' });
  if (m.aulas >= 300) chips.push({ label: '💪 +300 Aulas', type: '' });
  if (m.max_power >= 1000) chips.push({ label: '⚡ +1000W Peak', type: 'green' });
  if (m.avg_power_wkg >= 2.5) chips.push({ label: '🚀 +2.5 W/kg', type: 'green' });
  if (m.ftp >= 200) chips.push({ label: '🎯 FTP Elite +200W', type: 'green' });
  if (m.avg_speed >= 25) chips.push({ label: '💨 Velocista +25km/h', type: 'green' });
  if (m.distancia_km >= 10000) chips.push({ label: '🌍 +10.000 km', type: '' });
  if (m.distancia_km >= 5000) chips.push({ label: '🛣️ +5.000 km', type: '' });
  if (m.max_rpm >= 180) chips.push({ label: '🌪️ Max RPM 180', type: 'green' });
  if (m.avg_rpm >= 72) chips.push({ label: '⚙️ RPM Alto', type: '' });

  const pctilePts = getPercentileRank(m, 'pontos');
  if (pctilePts >= 80) chips.push({ label: `📊 Top ${100-pctilePts}% em Pontos`, type: '' });

  if (chips.length === 0) chips.push({ label: '🌱 Começando a jornada!', type: '' });

  document.getElementById('achievements').innerHTML = chips.map(c =>
    `<span class="chip ${c.type}">${c.label}</span>`
  ).join('');

  renderEvolution(m);
}

const METRIC_LABELS = {
  TotalCalories: "Calorias (kcal)",
  Duration: "Duração (min)",
  Distance: "Distância (km)",
  AvgRPM: "RPM Médio",
  MaxRPM: "RPM Máximo",
  AvgPower: "Potência Média (W)",
  MaxPower: "Potência Máxima (W)",
  AvgPowerWKG: "W/kg Médio",
  MaxPowerWKG: "W/kg Máximo",
  AvgSpeed: "Vel. Média (km/h)",
  MaxSpeed: "Vel. Máxima (km/h)",
  "FTP (Average)": "FTP (W)",
  TotalSessions: "Aulas no Mês",
  TotalEnergy: "Energia (kJ)"
};

const GOOD_METRICS = ["TotalSessions","Distance","TotalCalories","AvgPower","AvgPowerWKG","AvgSpeed","AvgRPM","TotalEnergy"];

let evolutionChart = null;
let currentMetric = "TotalSessions";

function formatSnap(s) {
  const [y, m] = s.split('-');
  const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return months[parseInt(m)-1] + '/' + y.slice(2);
}

function downloadCSV() {
  if (!currentMember) return;
  const name = currentMember.apelido;
  const memberData = EVOLUTION.data[name];
  if (!memberData) return;

  const allMetrics = EVOLUTION.metrics;
  const snaps = EVOLUTION.snapshots;

  // Header
  const header = ['Mês', ...allMetrics.map(m => METRIC_LABELS[m] || m)];

  // Rows
  const rows = snaps.map((snap, i) => {
    const row = [formatSnap(snap)];
    allMetrics.forEach(metric => {
      const val = memberData[metric] ? memberData[metric][i] : null;
      row.push(val !== null && val !== undefined ? val : '');
    });
    return row;
  });

  const csv = [header, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pedala_ai_${name.toLowerCase().replace(/\s+/g,'_')}_abr25_abr26.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

  const pillsEl = document.getElementById('metricPills');
  if (!pillsEl) return;
  pillsEl.innerHTML = '';
  GOOD_METRICS.forEach(metric => {
    const pill = document.createElement('button');
    pill.className = 'member-pill' + (metric === currentMetric ? ' active' : '');
    pill.style.cssText = 'padding:6px 14px;font-size:11px;';
    pill.textContent = METRIC_LABELS[metric];
    pill.onclick = () => { currentMetric = metric; renderEvolution(currentMember); };
    pillsEl.appendChild(pill);
  });

  const memberData = EVOLUTION.data[m.apelido];
  if (!memberData) return;

  const series = memberData[currentMetric] || [];
  const labels = EVOLUTION.snapshots.map(formatSnap);

  if (evolutionChart) { evolutionChart.destroy(); evolutionChart = null; }

  const canvas = document.getElementById('evolutionChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  evolutionChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: METRIC_LABELS[currentMetric],
        data: series,
        borderColor: '#E8FF3C',
        backgroundColor: 'rgba(232,255,60,0.07)',
        borderWidth: 2.5,
        pointBackgroundColor: '#E8FF3C',
        pointBorderColor: '#09090F',
        pointBorderWidth: 2,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        fill: true,
        spanGaps: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#16161f',
          borderColor: '#1e1e2e',
          borderWidth: 1,
          titleColor: '#E8FF3C',
          bodyColor: '#e8e8f0',
          callbacks: { label: ctx => `${METRIC_LABELS[currentMetric]}: ${ctx.parsed.y ?? '—'}` }
        }
      },
      scales: {
        x: { grid: { color: '#1e1e2e' }, ticks: { color: '#6b6b80', font: { size: 11 } } },
        y: { grid: { color: '#1e1e2e' }, ticks: { color: '#6b6b80', font: { size: 11 } }, beginAtZero: false }
      }
    }
  });
}
